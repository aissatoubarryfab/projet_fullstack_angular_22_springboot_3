<h2> Client List</h2>
<p>Clients: {{ clients.length }}</p>
<table class = "table table-striped">
  <thead>
  <tr>
    <th> First Name</th>
    <th> Last Name </th>
    <th> Email Id</th>
    <th> Actions </th>
  </tr>
  </thead>
  <tbody>
  @for (client of clients; track client.id){
    <tr>
    <td> {{ client.firstName }} </td>
    <td> {{ client.lastName }} </td>
    <td> {{ client.emailId }} </td>
      <td>
        <button (click) = "updateClient(client.id)" class = "btn btn-info"> Update</button>
        <button (click) = "deleteClient(client.id)" class = "btn btn-danger" style="margin-left: 10px"> Delete</button>
        <button (click) = "clientDetails(client.id)" class = "btn btn-info" style="margin-left: 10px"> View</button>
      </td>
    </tr>
  }

  </tbody>
</table>
